name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Static GitHub Pages demo: leave secrets unset — mock login + local IndexedDB only.
      # Later (Render + Supabase): add VITE_SYNC_API_BASE and optional VITE_SYNC_TENANT_SLUG.
      - name: Build
        env:
          VITE_SYNC_API_BASE: ${{ secrets.VITE_SYNC_API_BASE }}
          VITE_SYNC_TENANT_SLUG: ${{ secrets.VITE_SYNC_TENANT_SLUG || 'default' }}
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web/dist
