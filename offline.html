<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2a2a2a" />
    <title>Ayekta — Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        background: #f4f4f5;
        color: #18181b;
      }
      .card {
        max-width: 28rem;
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 0.5rem;
        padding: 1.5rem 1.75rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      }
      h1 {
        font-size: 1.125rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1rem;
        font-size: 0.875rem;
        color: #52525b;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      a,
      button {
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.5rem 1rem;
        border-radius: 0.25rem;
        cursor: pointer;
        text-decoration: none;
        border: 1px solid #d4d4d8;
        background: #fff;
        color: #18181b;
      }
      a.primary,
      button.primary {
        background: #ea580c;
        border-color: rgba(0, 0, 0, 0.08);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>
        Ayekta can’t reach the network right now. Chart data already on this device stays available when you open
        the app from cache. Try again when connectivity returns.
      </p>
      <div class="actions">
        <button type="button" class="primary" id="retry">Retry</button>
        <a class="primary" href="./">Open app</a>
      </div>
    </div>
    <script>
      document.getElementById('retry').addEventListener('click', function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
